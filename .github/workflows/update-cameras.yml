name: 단속 카메라 데이터 자동 업데이트

on:
  # 매월 1일 오전 3시 (KST) 자동 실행
  schedule:
    - cron: "0 18 1 * *"   # UTC 18:00 = KST 03:00

  # GitHub 웹에서 수동 실행 가능 (Actions 탭 → Run workflow)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존 패키지 설치
        run: pip install requests

      # ──────────────────────────────────────────────────────
      # data.go.kr 전국무인교통단속카메라표준데이터 API
      # API ID: 15028200
      # 서비스 키: GitHub → Settings → Secrets → PUBLIC_DATA_API_KEY
      # ──────────────────────────────────────────────────────
      - name: 단속 카메라 데이터 다운로드
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, requests, json, sys

          key = os.environ.get("PUBLIC_DATA_API_KEY", "").strip()
          if not key:
              print("⚠️  PUBLIC_DATA_API_KEY 미설정 — 스킵 (기존 SpeedCameras.json 유지)")
              sys.exit(0)

          BASE_URL = "https://api.data.go.kr/openapi/tn_pubr_public_unmanned_traffic_camera_api"
          PAGE_SIZE = 1000   # 최대 1000건/페이지

          # 속도 관련 단속구분만 포함 (신호위반·주정차 등은 제외)
          SPEED_TYPES = {"과속", "구간단속"}

          cameras = []
          page = 1

          while True:
              params = {
                  "serviceKey": key,
                  "pageNo": page,
                  "numOfRows": PAGE_SIZE,
                  "type": "json",
              }
              try:
                  r = requests.get(BASE_URL, params=params, timeout=60)
                  r.raise_for_status()
              except Exception as e:
                  print(f"❌ 다운로드 실패 (page {page}): {e}")
                  sys.exit(0)

              try:
                  data = r.json()
              except Exception as e:
                  print(f"❌ JSON 파싱 실패 (page {page}): {e}")
                  sys.exit(0)

              header = data.get("response", {}).get("header", {})
              result_code = header.get("resultCode", "")
              if result_code != "00":
                  print(f"❌ API 오류: {header.get('resultMsg', result_code)}")
                  sys.exit(0)

              body = data.get("response", {}).get("body", {})
              total_count = int(body.get("totalCount", 0))
              items_raw = body.get("items", {}).get("item", [])

              # 단건일 경우 dict로 반환될 수 있음
              if isinstance(items_raw, dict):
                  items_raw = [items_raw]

              for it in items_raw:
                  try:
                      lat = float(it.get("위도") or 0)
                      lng = float(it.get("경도") or 0)

                      # 한반도 범위 필터
                      if not (33.0 <= lat <= 38.5 and 124.5 <= lng <= 130.5):
                          continue

                      # 제한속도 (없으면 60으로 기본값)
                      limit_raw = it.get("제한속도") or "60"
                      try:
                          limit = int(float(str(limit_raw).strip()))
                      except Exception:
                          limit = 60

                      # 단속구분 파싱
                      dan_type = str(it.get("단속구분") or "").strip()
                      section_pos = str(it.get("단속구간위치구분") or "").strip()

                      # 속도 관련 카메라만 포함
                      if "과속" in dan_type:
                          if section_pos in ("구간시작", "구간끝", "구간"):
                              cam_type = "구간단속"
                          else:
                              cam_type = "고정식"
                      elif "구간" in dan_type:
                          cam_type = "구간단속"
                      else:
                          # 신호위반·주정차 등은 제외
                          continue

                      cameras.append({
                          "lat": round(lat, 6),
                          "lng": round(lng, 6),
                          "limit": limit,
                          "type": cam_type,
                      })

                  except Exception:
                      continue

              print(f"  page {page}: {len(items_raw)}건 처리 (누적 {len(cameras)}개 과속카메라)")

              # 다음 페이지 여부 확인
              if page * PAGE_SIZE >= total_count:
                  break
              page += 1

          if not cameras:
              print("⚠️  수집된 카메라 데이터 없음 — 기존 유지")
              sys.exit(0)

          output = {
              "_note": f"총 {len(cameras)}개 과속단속카메라 | data.go.kr 전국무인교통단속카메라표준데이터 | GitHub Actions 자동 업데이트",
              "cameras": cameras,
          }
          with open("TView/Resources/SpeedCameras.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          print(f"✅ {len(cameras)}개 카메라 저장 완료")
          EOF

      - name: 변경 사항 커밋 및 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TView/Resources/SpeedCameras.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            COUNT=$(python3 -c "import json; d=json.load(open('TView/Resources/SpeedCameras.json')); print(len(d['cameras']))")
            git commit -m "chore: 단속 카메라 데이터 업데이트 (${COUNT}개) [skip ci]"
            git push
            echo "✅ 업데이트 완료"
          fi
