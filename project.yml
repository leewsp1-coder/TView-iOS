name: TView
options:
  bundleIdPrefix: com.tview
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "17.0"
  generateEmptyDirectories: true

packages:
  Swifter:
    url: https://github.com/httpswift/swifter
    from: "1.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  TView:
    type: application
    platform: iOS
    sources:
      - path: TView
    dependencies:
      - package: Swifter
        product: Swifter
      - target: TViewBroadcast
    info:
      path: TView/Info.plist
      properties:
        CFBundleDisplayName: TView
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIBackgroundModes:
          - audio
        NSLocationWhenInUseUsageDescription: "세이프 드라이빙 가드 기능을 위해 위치 정보가 필요합니다."
        NSLocalNetworkUsageDescription: "iPhone과 Tesla 간 로컬 네트워크 통신을 위해 필요합니다."
        NSMicrophoneUsageDescription: "화면 미러링 중 오디오 캡처를 위해 필요합니다."
        NSBonjourServices:
          - "_http._tcp"
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tview.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: TView/TView.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tview.app

  TViewBroadcast:
    type: app-extension
    platform: iOS
    sources:
      - path: TViewBroadcast
    info:
      path: TViewBroadcast/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).BroadcastSampleHandler
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tview.app.broadcast
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
    entitlements:
      path: TViewBroadcast/TViewBroadcast.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tview.app

